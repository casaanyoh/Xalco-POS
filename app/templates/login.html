<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>XALCO POS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#131821] flex items-center justify-center h-screen"> <div class="bg-white p-10 rounded-2xl shadow-2xl w-[400px]">
        <div class="text-center mb-8">
            <img src="{{ url_for('static', filename='Xalco-03.png') }}" alt="XALCO LOGO" class="w-48 mx-auto">
            <p class="text-gray-400 text-xs mt-2 uppercase tracking-widest font-semibold">Terminal-ka Maamulka</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Username</label>
                <input type="text" id="username" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-[#23A892] outline-none transition" placeholder="Geli user-kaaga">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-[#23A892] outline-none transition" placeholder="••••••••">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-[#23A892] text-white py-4 rounded-xl font-bold hover:bg-[#1b8a77] shadow-lg active:scale-95 transition-all uppercase tracking-wider">
                Gal System-ka
            </button>
            
            <p id="error" class="text-red-500 text-center text-sm font-bold animate-pulse"></p>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(data.status === 'success') {
                window.location.href = '/';
            } else {
                document.getElementById('error').innerText = data.message;
            }
        }
    </script>
</body>
</html>
