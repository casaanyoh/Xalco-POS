<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>XALCO POS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#131821] flex items-center justify-center h-screen"> 
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-[400px]">
        <div class="text-center mb-8 border-b pb-4">
            <img src="{{ url_for('static', filename='Xalco-03.png') }}" alt="XALCO LOGO" class="w-48 mx-auto">
            <p class="text-gray-400 text-[10px] mt-2 uppercase tracking-widest font-bold italic">Welcome to the Xalco Coffee</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-xs font-black uppercase text-gray-500 mb-1 ml-1">Username</label>
                <input type="text" id="username" class="w-full border-2 border-gray-100 p-4 rounded-xl focus:border-[#23A892] outline-none transition text-slate-700" placeholder="Username">
            </div>
            <div>
                <label class="block text-xs font-black uppercase text-gray-500 mb-1 ml-1">Password</label>
                <input type="password" id="password" class="w-full border-2 border-gray-100 p-4 rounded-xl focus:border-[#23A892] outline-none transition" placeholder="••••••••">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-[#23A892] text-white py-4 rounded-xl font-black hover:opacity-90 shadow-lg active:scale-95 transition-all uppercase tracking-widest">
                Gal System-ka
            </button>
            
            <p id="error" class="text-red-500 text-center text-xs font-bold animate-pulse"></p>
        </div>
        
        <div class="mt-8 text-center">
            <p class="text-[9px] text-gray-300 font-bold italic uppercase">&copy; 2026 Dhabbo Digital Solutions</p>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorEl = document.getElementById('error');

            if(!u || !p) {
                errorEl.innerText = "Fadlan buuxi Username iyo Password!";
                return;
            }

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();

                if(data.status === 'success') {
                    window.location.href = '/';
                } else {
                    errorEl.innerText = data.message;
                }
            } catch (err) {
                errorEl.innerText = "Xiriirka database-ka waa go'an yahay!";
            }
        }

        // Enter key support
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
