<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XALCO POS System - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print { 
            .no-print { display: none !important; } 
            body { background: white; padding: 0; }
            .print-only { display: block !important; width: 100%; }
        }
        .modal { transition: all 0.3s ease; z-index: 100; }
        .modal.hidden { display: none; opacity: 0; }
        body.modal-active { overflow: hidden; }
        /* XALCO Colors */
        .bg-xalco-dark { background-color: #131821; }
        .bg-xalco-green { background-color: #23A892; }
        .text-xalco-green { color: #23A892; }
        .border-xalco-green { border-color: #23A892; }
        .hover-xalco-green:hover { background-color: #1b8a77; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal text-[#131821]">

    <div class="flex h-screen overflow-hidden">
        
        <div class="w-64 bg-xalco-dark text-white flex-shrink-0 no-print flex flex-col shadow-2xl">
            <div class="p-6 border-b border-slate-800 text-center">
                <img src="{{ url_for('static', filename='Xalco-03.png') }}" class="w-32 mx-auto mb-4 invert brightness-200">
                
                <div class="relative inline-block group mb-2">
                    <img id="sidebarProfileImg" src="{{ user.profile_img if user.profile_img else 'https://via.placeholder.com/80' }}" 
                         class="w-16 h-16 rounded-full mx-auto border-2 border-xalco-green object-cover cursor-pointer hover:opacity-80 transition"
                         onclick="toggleModal('profileModal')">
                    <div class="absolute bottom-0 right-0 bg-xalco-green p-1 rounded-full border-2 border-xalco-dark">
                        <i class="fas fa-camera text-[10px] text-white"></i>
                    </div>
                </div>
                
                <div class="mt-2 p-2 bg-slate-800/50 rounded-xl">
                    <p class="text-[9px] text-gray-400 uppercase font-bold tracking-tighter">Shaqaalaha:</p>
                    <p class="text-xs text-xalco-green font-semibold italic">{{ user.fullname }}</p>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-1">
                <p class="text-[10px] text-gray-500 uppercase px-3 mb-2 tracking-widest">Main Menu</p>
                <button onclick="location.reload()" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl transition flex items-center gap-3 text-sm">
                    <i class="fas fa-desktop text-xalco-green"></i> POS Terminal
                </button>

                {% if user.role == 'admin' %}
                <div class="pt-4 mt-4 border-t border-slate-800">
                    <p class="text-[10px] text-gray-500 uppercase px-3 mb-2 tracking-widest">Administrator</p>
                    <button onclick="toggleModal('userModal')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl transition flex items-center gap-3 text-sm">
                        <i class="fas fa-users-cog text-xalco-green"></i> Users Control
                    </button>
                    <button onclick="toggleModal('productModal')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl transition flex items-center gap-3 text-sm">
                        <i class="fas fa-hamburger text-xalco-green"></i> Manage Products
                    </button>
                    <button onclick="toggleModal('tableModal')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl transition flex items-center gap-3 text-sm">
                        <i class="fas fa-chair text-xalco-green"></i> Tables Setup
                    </button>
                    <button onclick="toggleModal('paymentModal')" class="w-full text-left p-3 hover:bg-slate-800 rounded-xl transition flex items-center gap-3 text-sm">
                        <i class="fas fa-credit-card text-xalco-green"></i> Payment Methods
                    </button>
                </div>
                {% endif %}
            </nav>

            <div class="p-4 border-t border-slate-800">
                <a href="/logout" class="block w-full text-center p-3 bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white rounded-xl font-bold transition text-sm">
                    <i class="fas fa-sign-out-alt mr-2"></i> Logout System
                </a>
            </div>
        </div>

        <main class="flex-1 flex overflow-hidden p-6 gap-6 no-print">
            <div class="flex-1 bg-white rounded-2xl shadow-xl border border-gray-200 p-8 overflow-y-auto">
                <div class="flex justify-between items-center mb-8 border-b pb-4">
                    <h2 class="text-2xl font-black text-slate-800">
                        <i class="fas fa-shopping-basket text-xalco-green mr-2"></i>Dalabka Cusub
                    </h2>
                    <span class="bg-gray-100 px-4 py-1 rounded-full text-xs font-bold text-gray-500">
                        <i class="far fa-clock mr-1"></i> <span id="liveTime"></span>
                    </span>
                </div>
                
                <div class="grid grid-cols-2 gap-8 mb-8">
                    <div class="relative">
                        <label class="block text-xs font-black uppercase text-gray-500 mb-2 ml-1">Dooro Alaabta</label>
                        <div class="relative">
                            <i class="fas fa-tag absolute left-4 top-4 text-gray-400"></i>
                            <select id="prodSelect" class="w-full border-2 border-gray-50 p-4 pl-12 rounded-2xl focus:border-xalco-green outline-none bg-gray-50 transition font-bold text-slate-700 appearance-none"></select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase text-gray-500 mb-2 ml-1">Tirada (Qty)</label>
                        <div class="relative">
                            <i class="fas fa-sort-numeric-up absolute left-4 top-4 text-gray-400"></i>
                            <input type="number" id="posQty" value="1" min="1" class="w-full border-2 border-gray-50 p-4 pl-12 rounded-2xl focus:border-xalco-green outline-none bg-gray-50 transition font-bold">
                        </div>
                    </div>
                </div>

                <button onclick="addToCart()" class="w-full bg-xalco-dark text-white py-5 rounded-2xl font-black hover:opacity-90 shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-cart-plus text-xalco-green text-xl"></i> HADA KU DAR (ADD TO CART)
                </button>

                <div class="mt-12 grid grid-cols-2 gap-8 p-6 bg-gray-50 rounded-3xl border-2 border-dashed border-gray-200">
                    <div>
                        <label class="block text-xs font-black uppercase text-gray-500 mb-2 ml-1">Miiska (Table)</label>
                        <select id="tableSelect" class="w-full border-2 border-white p-4 rounded-2xl focus:border-xalco-green outline-none shadow-sm font-bold text-slate-700">
                            <option value="1">Table 01</option>
                            <option value="2">Table 02</option>
                            <option value="3">Table 03</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="printInvoice()" class="w-full bg-xalco-green text-white py-4 rounded-2xl font-black hover:shadow-xl hover:shadow-emerald-200 active:scale-95 transition-all uppercase tracking-tighter flex items-center justify-center gap-2">
                            <i class="fas fa-print"></i> Print Invoice
                        </button>
                    </div>
                </div>
            </div>

            <div id="receipt-preview" class="w-80 bg-white rounded-2xl shadow-xl p-5 border-2 border-gray-100 overflow-y-auto h-full font-mono relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-xalco-green"></div>
                <div class="text-center mb-4 mt-2">
                    <img src="{{ url_for('static', filename='Xalco-03.png') }}" class="w-20 mx-auto mb-2 rounded opacity-90">
                    <h2 class="text-xl font-black text-xalco-dark tracking-tighter">XALCO CAFE</h2>
                    <div id="receiptPaymentMethods" class="text-[8px] font-bold text-gray-400 mb-1 tracking-widest"></div>
                    <p class="text-[9px] text-gray-400 uppercase italic">Mogadishu, Somalia</p>
                </div>
                
                <div class="border-t border-dashed border-gray-300 my-4"></div>
                
                <div class="text-[10px] space-y-1 mb-4 font-bold text-gray-600">
                    <div class="flex justify-between"><span>Table: <span class="text-xalco-green" id="viewTable">1</span></span> <span>Guest: <span class="text-xalco-green" id="viewGuest">1</span></span></div>
                    <p>Date: <span id="viewDate" class="text-gray-400"></span></p>
                </div>

                <table class="w-full text-[11px] mb-6">
                    <thead class="border-b-2 border-gray-100">
                        <tr class="text-left text-gray-400"><th class="py-2">Item</th><th class="text-right py-2">Price</th></tr>
                    </thead>
                    <tbody id="cartTable" class="divide-y divide-gray-50"></tbody>
                </table>

                <div class="bg-xalco-dark text-white p-4 rounded-xl text-right">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Total Amount</p>
                    <p class="text-2xl font-black text-xalco-green leading-none mt-1">$<span id="totalVal">0.00</span></p>
                </div>
                
                <div class="mt-8 text-center border-t border-dashed border-gray-300 pt-4">
                    <p class="text-[9px] font-bold text-gray-400">MAHADSANID, SOO LAABO!</p>
                    <div class="flex justify-center gap-1 mt-1 opacity-20">
                        <div class="w-1 h-1 bg-black rounded-full"></div>
                        <div class="w-1 h-1 bg-black rounded-full"></div>
                        <div class="w-1 h-1 bg-black rounded-full"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Update Live Time
        setInterval(() => {
            document.getElementById('liveTime').innerText = new Date().toLocaleTimeString();
        }, 1000);

        let cart = [];
        let guestCount = 1;

        function init() {
            loadProducts();
            loadPayments();
            const userRole = "{{ user.role }}";
            if (userRole === 'admin') {
                loadUsers();
                loadAdminProducts();
            }
        }

        async function loadProducts() {
            const res = await fetch('/get_products');
            const data = await res.json();
            let select = document.getElementById('prodSelect');
            select.innerHTML = '<option value="">-- Dooro Alaab --</option>';
            data.forEach(p => {
                let option = document.createElement('option');
                option.value = p.name;
                option.dataset.price = p.price;
                option.textContent = `${p.name} ($${p.price})`;
                select.appendChild(option);
            });
        }

        async function loadPayments() {
            const res = await fetch('/api/payments');
            const data = await res.json();
            const view = document.getElementById('receiptPaymentMethods');
            view.innerHTML = data.map(p => `<span>| ${p.method_name} </span>`).join('') + ' |';
        }

        function addToCart() {
            let sel = document.getElementById('prodSelect');
            if(!sel.value) return;
            let name = sel.value;
            let price = parseFloat(sel.options[sel.selectedIndex].dataset.price);
            let qty = parseInt(document.getElementById('posQty').value);
            cart.push({name, price, qty});
            renderCart();
        }

        function renderCart() {
            let tb = document.getElementById('cartTable');
            tb.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                let line = item.price * item.qty;
                total += line;
                tb.innerHTML += `<tr><td class="py-3 text-slate-600 font-bold">${item.name} <span class="text-[9px] text-gray-300 ml-1">x${item.qty}</span></td><td class="py-3 text-right font-black text-slate-800">$${line.toFixed(2)}</td></tr>`;
            });
            document.getElementById('totalVal').innerText = total.toFixed(2);
            document.getElementById('viewDate').innerText = new Date().toLocaleString();
            document.getElementById('viewTable').innerText = document.getElementById('tableSelect').value;
        }

        function printInvoice() {
            if(cart.length === 0) return alert("Cart-ga waa madan yahay!");
            window.print();
            fetch('/complete_order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({table_num: document.getElementById('tableSelect').value})
            }).then(() => {
                guestCount++;
                document.getElementById('viewGuest').innerText = guestCount;
                cart = [];
                renderCart();
            });
        }

        function toggleModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.toggle('hidden');
        }

        init();
    </script>
</body>
</html>
